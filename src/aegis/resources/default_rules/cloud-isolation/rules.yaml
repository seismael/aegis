# Default Aegis Cloud Isolation Rule Pack
# Hexagonal architecture enforcement — domain layers must not import cloud SDKs.

rules:
  - id: cloud-isolation-domain
    description: "Cloud Leakage: Domain layer must not import cloud SDKs directly."
    severity: HIGH
    mode: block
    applies_to:
      - "**/domain/**"
    metadata:
      plugin: cloud-isolation
      sdks:
        - boto3
        - google.cloud
        - azure
        - kubernetes
    rationale: "Ensures the domain layer remains cloud-agnostic as per Hexagonal Architecture principles."

  - id: cloud-isolation-db
    description: Database driver imports should be isolated behind repository interfaces.
    engine_type: regex
    severity: HIGH
    mode: block
    applies_to:
      - "**/domain/**"
    query: import\s+(psycopg|mysql|sqlite3|sqlalchemy|pymongo|redis|aiomysql)
    rationale: Database drivers in domain layer violate hexagonal architecture; depend on repository abstractions.

  - id: cloud-isolation-messaging
    description: Message queue imports should be isolated behind port interfaces in domain layer.
    engine_type: regex
    severity: HIGH
    mode: block
    applies_to:
      - "**/domain/**"
    query: import\s+(pika|kafka|celery|redis|nats|sqs|pubsub)
    rationale: Message broker imports in domain layer couple business logic to transport infrastructure.
