# Default Aegis Dependencies Rule Pack
# Dependency hygiene — version pinning, license compliance, and vulnerability gates.

rules:
  - id: deps-pinned-versions
    description: Production dependencies should be pinned to specific versions.
    engine_type: regex
    severity: MEDIUM
    mode: warn
    applies_to:
      - "requirements*.txt"
      - "pyproject.toml"
    query: \w+[\s>]?=[\s>]?\d+\.\d+\.\d+
    rationale: Unpinned dependencies can introduce breaking changes on rebuild or redeploy.

  - id: deps-known-vulnerabilities
    description: Review dependency versions for known vulnerabilities.
    engine_type: regex
    severity: LOW
    mode: report
    query: \b(django|flask|requests|urllib3|cryptography|jinja2)\s*[><]=\s*[0-9]
    rationale: Pin versions with known CVEs should be reviewed. Use 'pip-audit' or 'safety' for actual CVE detection.

  - id: deps-excessive-count
    description: Projects with excessive direct dependencies increase attack surface.
    engine_type: graph
    severity: LOW
    mode: report
    query: dependency_count
    rationale: Every dependency adds attack surface and transitive risk; review and consolidate.

  - id: deps-license-compliance
    description: Project should declare a license compatible with its dependencies.
    engine_type: regex
    severity: MEDIUM
    mode: warn
    applies_to:
      - "LICENSE*"
    query: (MIT|Apache|BSD|GPL|LGPL)
    rationale: Missing or incompatible license files create legal risk for distribution.

  - id: deps-duplicate-transitive
    description: Duplicate transitive dependencies indicate version conflicts.
    engine_type: graph
    severity: LOW
    mode: report
    query: duplicate_dependency
    rationale: Version conflicts in transitive dependencies cause subtle runtime bugs.
