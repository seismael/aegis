# Aegis Structure Rule Pack
# Module boundaries, file organization, package conventions, and directory hygiene.

rules:
  - id: struct-module-boundaries
    description: Star imports bypass module boundaries and make public interfaces implicit.
    engine_type: regex
    severity: MEDIUM
    mode: warn
    query: (?m)^from\s+\S+\s+import\s+\*(?![^#]*noqa)
    rationale: Star imports create namespace pollution and make dependency analysis impossible.

  - id: struct-file-per-concept
    description: Files containing multiple public classes indicate missing decomposition.
    engine_type: regex
    severity: LOW
    mode: report
    applies_to:
      - "**/domain/**"
      - "**/models/**"
    query: (?m)^class\s+\w+[\s\S]{0,200}^class\s+\w+
    rationale: One file per concept improves discoverability and keeps merge conflicts focused.

  - id: struct-max-file-length
    description: Source files should not exceed 500 lines for maintainability.
    engine_type: regex
    severity: WARN
    mode: report
    applies_to:
      - "**/*.py"
    query: ^.{1,}$
    rationale: Long files are harder to navigate, review, and test. Split by responsibility.

  - id: struct-no-utils
    description: Modules named utils, helpers, or common often become incoherent dumping grounds.
    engine_type: regex
    severity: LOW
    mode: report
    query: (?m)^(import|from)\s+\S+\.(utils|helpers|common)\.
    rationale: Orphaned utility modules lack cohesion. Place functions near their usage or in domain-specific collections.

  - id: struct-no-init-logic
    description: __init__.py should not contain executable logic beyond imports.
    engine_type: regex
    severity: MEDIUM
    mode: warn
    applies_to:
      - "**/__init__.py"
    query: (?m)^(def |class )
    rationale: __init__.py logic executes at import time, causing side effects and making testing and reloading difficult.

  - id: struct-circular-package
    description: Packages should not form circular import chains.
    engine_type: graph
    severity: HIGH
    mode: block
    query: circular_dependency
    rationale: Circular package dependencies prevent independent testing and deployment.

  - id: struct-package-exports
    description: Packages should define __all__ to make the public API explicit.
    engine_type: regex
    severity: LOW
    mode: report
    applies_to:
      - "**/__init__.py"
    query: __all__
    rationale: Explicit __all__ lists document the package's public interface and enable wildcard import control.

  - id: struct-package-naming
    description: Package names should use short, lowercase names without underscores for maximum compatibility.
    engine_type: regex
    severity: LOW
    mode: report
    applies_to:
      - "**/setup.cfg"
      - "**/setup.py"
      - "**/pyproject.toml"
    query: name\s*=\s*["'][a-z][a-z0-9]*["']
    rationale: PEP 8 recommends short, all-lowercase package names without underscores.
