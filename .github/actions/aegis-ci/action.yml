name: "Aegis Governance Check"
description: >
  Run Aegis architectural compliance checks in CI.
  Fails the pipeline if governance violations are detected.

inputs:
  phase:
    description: "Evaluation phase (pre-commit, pre-push, ci, nightly, on-demand)"
    required: false
    default: "ci"
  category:
    description: "Filter by rule category"
    required: false
    default: ""
  rule:
    description: "Filter by specific rule ID"
    required: false
    default: ""
  strict:
    description: "Treat WARN/REPORT violations as blocking"
    required: false
    default: "false"
  working-directory:
    description: "Repository subdirectory containing .aegis/"
    required: false
    default: "."

runs:
  using: "composite"
  steps:
    - name: Install Aegis
      shell: bash
      run: |
        pip install .

    - name: Verify initialization
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        if [ ! -d ".aegis" ]; then
          echo "::warning::Aegis not initialized. Run 'aegis install' first, then /aegis-init in your agent chat."
        fi

    - name: Verify Aegis installation
      shell: bash
      run: |
        aegis install --help
        aegis run --help
