# Default Aegis JavaScript/TypeScript Rule Pack
# Best practices and anti-pattern detection for JS/TS codebases.

rules:
  - id: ts-no-console-log
    description: Console.log statements should not be committed in production code.
    engine_type: regex
    severity: MEDIUM
    mode: warn
    applies_to:
      - "**/*.ts"
      - "**/*.js"
      - "**/*.tsx"
      - "**/*.jsx"
    query: console\.\s*(log|debug|info|warn|error)\s*\(
    rationale: Console output in production clutters logs and may leak sensitive information.

  - id: ts-use-strict-equality
    description: Prefer === and !== over == and != to avoid type coercion bugs.
    engine_type: regex
    severity: MEDIUM
    mode: warn
    applies_to:
      - "**/*.ts"
      - "**/*.js"
      - "**/*.tsx"
      - "**/*.jsx"
    query: (?<![\w)])==(?!==)(?!\s*['"0-9])
    rationale: Loose equality produces surprising type-coercion results that mask bugs.

  - id: ts-no-var
    description: Use let or const instead of var for variable declarations.
    engine_type: regex
    severity: MEDIUM
    mode: warn
    applies_to:
      - "**/*.ts"
      - "**/*.js"
      - "**/*.tsx"
      - "**/*.jsx"
    query: ^\s*var\s+\w
    rationale: var uses function scoping instead of block scoping, leading to hoisting bugs.

  - id: ts-no-any-type
    description: Avoid the any type; use unknown for truly flexible values.
    engine_type: regex
    severity: MEDIUM
    mode: warn
    applies_to:
      - "**/*.ts"
      - "**/*.tsx"
    query: :\s*any\b
    rationale: The any type disables all type-checking on that value, defeating TypeScript's purpose.

  - id: ts-async-error-handling
    description: Async functions should handle promise rejections via try/catch or .catch().
    engine_type: regex
    severity: HIGH
    mode: block
    applies_to:
      - "**/*.ts"
      - "**/*.js"
      - "**/*.tsx"
      - "**/*.jsx"
    query: async\s+function\s+\w+.{0,500}(?!\.catch|try\s*\{)
    rationale: Unhandled promise rejections crash Node.js and leave applications in unknown state.

  - id: ts-no-ts-ignore
    description: Use @ts-expect-error with justification instead of @ts-ignore.
    engine_type: regex
    severity: MEDIUM
    mode: warn
    applies_to:
      - "**/*.ts"
      - "**/*.tsx"
    query: "@ts-ignore"
    rationale: "@ts-ignore suppresses all type errors silently; prefer @ts-expect-error with a reason."
