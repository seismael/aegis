rules:
  - id: custom-no-print
    description: Use self.console.print() or logger/structlog instead of built-in print().
    engine_type: regex
    severity: LOW
    mode: report
    category: best-practices
    query: (?<!self\.console\.)print\(
    language: py
    applies_to:
      - src/**/*.py
    excludes:
      - tests/**
    rationale: print() bypasses structured logging; use console.print() or structlog instead.
