# Aegis Dependencies Rule Pack
# Dependency hygiene — version pinning, license compliance, vulnerability awareness, outdated detection.

rules:
  - id: deps-pinned-versions
    description: Production dependencies should be pinned to specific versions or constrained with compatible-release.
    engine_type: regex
    severity: MEDIUM
    mode: warn
    applies_to:
      - "requirements*.txt"
      - "pyproject.toml"
    query: \w+[\s>]?=[\s>]?\d+\.\d+\.\d+
    rationale: Unpinned dependencies cause unpredictable builds when upstream releases change.

  - id: deps-known-vulnerabilities
    description: Review dependency versions for known security vulnerabilities.
    engine_type: regex
    severity: LOW
    mode: report
    query: \b(django|flask|requests|urllib3|cryptography|jinja2)\s*[><]=\s*[0-9]
    rationale: Known-vulnerable package versions should be upgraded to patched releases promptly.

  - id: deps-excessive-count
    description: Projects with excessive direct dependencies increase attack surface and maintenance burden.
    engine_type: graph
    severity: LOW
    mode: report
    query: dependency_count
    rationale: Each dependency is a liability. Review whether each direct dependency is truly necessary.

  - id: deps-license-compliance
    description: Project should declare a license compatible with its dependency licenses.
    engine_type: regex
    severity: MEDIUM
    mode: warn
    applies_to:
      - "LICENSE*"
    query: (MIT|Apache|BSD|GPL|LGPL|MPL)
    rationale: Mismatched licenses can create legal risk. Ensure chosen license is compatible with all dependencies.

  - id: deps-duplicate-transitive
    description: Duplicate transitive dependencies indicate version conflicts.
    engine_type: graph
    severity: LOW
    mode: report
    query: duplicate_dependency
    rationale: Multiple versions of the same package in the resolution graph can cause runtime conflicts.

  - id: deps-outdated-check
    description: Dependencies should be regularly checked for updates using pip-audit or dependabot.
    engine_type: regex
    severity: LOW
    mode: report
    applies_to:
      - ".github/dependabot.yml"
      - ".github/workflows/*.yml"
    query: \b(pip-audit|dependabot|renovate|dependencies)\b
    rationale: Automated dependency updates ensure the project stays current with security patches and improvements.
