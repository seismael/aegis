# Aegis General Rule Pack
# Catch-all meta-rules — binary artifacts, private keys, large files, repo conventions.

rules:
  - id: general-binary-artifacts
    description: Binary artifacts and generated files should not be committed to version control.
    engine_type: regex
    severity: MEDIUM
    mode: warn
    query: __pycache__|\.egg-info|\.DS_Store|node_modules|\.idea|\.vs|\.vscode
    rationale: Generated files bloat the repository and create merge conflicts. Use .gitignore instead.

  - id: general-private-keys
    description: Private keys in source code are a critical security risk.
    engine_type: regex
    severity: CRITICAL
    mode: block
    query: (?i)(BEGIN\s+(RSA|DSA|EC|PGP|OPENSSH)\s+PRIVATE|PRIVATE\s+KEY)
    rationale: Private keys committed to a repository are exposed to all contributors and can never be truly revoked.

  - id: general-large-files
    description: Very large files should not be committed without clear justification.
    engine_type: regex
    severity: MEDIUM
    mode: warn
    applies_to:
      - "*.csv"
      - "*.json"
      - "*.sql"
    query: ^$
    rationale: Large data files increase clone times and repository size. Use external storage for datasets.

  - id: general-config-standards
    description: Project should define editor and git configuration conventions.
    engine_type: regex
    severity: LOW
    mode: report
    applies_to:
      - ".editorconfig"
      - ".gitattributes"
      - ".gitignore"
    query: .+
    rationale: Shared editor and git configs reduce formatting inconsistencies across contributors.

  - id: general-gitignore-completeness
    description: .gitignore should cover common Python artifacts (venv, pycache, eggs, builds, coverage).
    engine_type: regex
    severity: LOW
    mode: report
    applies_to:
      - ".gitignore"
    query: \b(venv|__pycache__|\.egg|dist|build|\.coverage|\.pytest_cache)\b
    rationale: A thorough .gitignore prevents accidental commits of virtual environments and build artifacts.

  - id: general-ci-pipeline
    description: Project should have CI pipeline configuration for automated testing and linting.
    engine_type: regex
    severity: MEDIUM
    mode: warn
    applies_to:
      - ".github/workflows/*.yml"
    query: \b(run:|steps:|jobs:)\b
    rationale: CI pipelines enforce consistent quality gates across all contributions and prevent regressions.
